# Netlify: static Vite app in /frontend. API is separate — set VITE_API_URL in the
# Netlify UI (Environment variables) to your deployed API origin, then redeploy.
[build]
  command = "npm ci && npm ci --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"
  # Vite is a devDependency; Netlify defaults to production installs that skip it
  NPM_CONFIG_PRODUCTION = "false"
